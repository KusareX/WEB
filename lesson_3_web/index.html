<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
<table>
    <tr>
        <td class="border-top-bottom">1</td>
        <td class="border-top-bottom">2</td>
        <td class="border-top-bottom">3</td>
        <td class="border-top-bottom">4</td>
    </tr>
    <tr>
        <td>5</td>
        <td rowspan="2" class="color1">6</td>
        <td>7</td>
        <td>8</td>
    </tr>
    <tr>
        <td>9</td>
        <td>11</td>
        <td>12</td>
    </tr>
    <tr>
        <td>13</td>
        <td class="color2">14</td>
        <td>15</td>
        <td>16</td>
    </tr>
    <tr>
        <td>17</td>
        <td class="color2">18</td>
        <td>19</td>
        <td>20</td>
    </tr>
    <tr>
        <td>21</td>
        <td class="color2">22</td>
        <td>23</td>
        <td>24</td>  
    </tr>
    <tr>
        <td>25</td>
        <td colspan="3" class="color3">26</td>
    </tr>
    <tr>
        <td>29</td>
        <td class="color1">30</td>
        <td class="color1">31</td>
        <td class="color1">32</td>
    </tr>
</table>
</body>
</html>
